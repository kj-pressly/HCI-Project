<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demographics Survey With Rephrase</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Patient Demographics Form (Rephrase Enabled)</h1>
    <p class="subtitle">Use Rephrase to simplify any question, or type a clarifying question and click Ask AI.</p>

    <form id="surveyForm"></form>

    <button id="submitBtn" type="button" class="submit-btn">Submit</button>
    <p id="result" class="result" aria-live="polite"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
